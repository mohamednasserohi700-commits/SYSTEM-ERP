{% macro hrm_nav(active='') %}

    <a href="{{ url_for('hrm_dashboard') }}" class="btn btn-xs {{ 'btn-primary' if active=='dashboard' else 'btn-outline' }}"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
    <a href="{{ url_for('hrm_employees') }}" class="btn btn-xs {{ 'btn-primary' if active=='employees' else 'btn-outline' }}"><i class="fas fa-users"></i> الموظفون</a>

    <a href="{{ url_for('hrm_attendance') }}" class="btn btn-xs {{ 'btn-primary' if active=='attendance' else 'btn-outline' }}"><i class="fas fa-clock"></i> الحضور</a>

    <a href="{{ url_for('hrm_reports') }}" class="btn btn-xs {{ 'btn-primary' if active=='reports' else 'btn-outline' }}"><i class="fas fa-chart-bar"></i> التقارير</a>
