{% extends 'base.html' %}
{% set block_icon = 'fas fa-building' %}
{% block title %}تعديل فرع{% endblock %}
{% block page_title %}تعديل فرع{% endblock %}
{% block breadcrumb %}الفروع / تعديل{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;">
    <div class="card-header"><div class="card-title"><i class="fas fa-edit"></i> بيانات الفرع</div></div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_branch', id=branch.id) }}">
            <div class="form-group"><label class="form-label">اسم الفرع *</label><input type="text" name="name" class="form-control" value="{{ branch.name }}" required></div>
            <div class="form-group"><label class="form-label">العنوان</label><input type="text" name="address" class="form-control" value="{{ branch.address or '' }}"></div>
            <div class="form-group"><label class="form-label">الهاتف</label><input type="text" name="phone" class="form-control" value="{{ branch.phone or '' }}"></div>
            <div class="form-group">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" name="is_active" {{ 'checked' if branch.is_active }}> فرع نشط
                </label>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
                <a href="{{ url_for('branches') }}" class="btn btn-outline">رجوع</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
