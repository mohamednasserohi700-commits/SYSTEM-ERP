{% extends 'base.html' %}
{% set block_icon = 'fas fa-key' %}
{% block title %}تغيير كلمة المرور{% endblock %}
{% block page_title %}تغيير كلمة المرور{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;"><div class="card-body">
<form method="POST">
    <div class="form-group">
        <label class="form-label">كلمة المرور الحالية *</label>
        <div class="input-wrap" style="position:relative">
            <input type="password" name="old_password" class="form-control" required autocomplete="current-password">
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">كلمة المرور الجديدة *</label>
        <input type="password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
    </div>
    <div class="form-group">
        <label class="form-label">تأكيد كلمة المرور الجديدة *</label>
        <input type="password" name="confirm_password" class="form-control" required autocomplete="new-password">
    </div>
    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> تغيير كلمة المرور</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline">إلغاء</a>
    </div>
</form>
</div></div>
{% endblock %}
