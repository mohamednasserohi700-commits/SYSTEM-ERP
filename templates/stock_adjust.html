{% extends 'base.html' %}
{% set block_icon = 'fas fa-sliders-h' %}
{% block title %}تسوية المخزون{% endblock %}
{% block page_title %}تسوية يدوية للمخزون{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;"><div class="card-body">
<div class="alert alert-warning" style="margin-bottom:20px;">
    <i class="fas fa-exclamation-triangle"></i>
    تسوية المخزون ستغير الرصيد مباشرة. استخدمها فقط للجرد أو التصحيح.
</div>
<form method="POST">
    <div class="form-group">
        <label class="form-label">الصنف *</label>
        <select name="product_id" class="form-control" required>
            <option value="">اختر الصنف...</option>
            {% for p in products %}<option value="{{ p.id }}">{{ p.name }} ({{ p.code }})</option>{% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label class="form-label">المخزن *</label>
        <select name="warehouse_id" class="form-control" required>
            <option value="">اختر المخزن...</option>
            {% for wh in warehouses %}<option value="{{ wh.id }}">{{ wh.name }}</option>{% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label class="form-label">الكمية الفعلية الجديدة *</label>
        <input type="number" name="quantity" class="form-control" step="0.01" min="0" required placeholder="الرصيد الفعلي بعد الجرد">
    </div>
    <div class="form-group">
        <label class="form-label">سبب التسوية</label>
        <input type="text" name="reason" class="form-control" placeholder="مثل: فرق جرد، كسر، تلف...">
    </div>
    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> تأكيد التسوية</button>
        <a href="{{ url_for('inventory') }}" class="btn btn-outline">إلغاء</a>
    </div>
</form>
</div></div>
{% endblock %}
