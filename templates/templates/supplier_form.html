{% extends 'base.html' %}
{% set block_icon = 'fas fa-truck' %}
{% block title %}{{ 'تعديل مورد' if supplier else 'إضافة مورد' }}{% endblock %}
{% block page_title %}{{ 'تعديل مورد' if supplier else 'إضافة مورد' }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;"><div class="card-body">
<form method="POST">
<div class="form-grid-2">
<div class="form-group"><label class="form-label">الكود</label><input type="text" name="code" class="form-control" value="{{ supplier.code if supplier else '' }}" placeholder="{% if not supplier and suggested_code %}يُقترح: {{ suggested_code }} (فارغ = تلقائي){% endif %}"></div>
<div class="form-group"><label class="form-label">الاسم *</label><input type="text" name="name" class="form-control" value="{{ supplier.name if supplier else '' }}" required></div>
<div class="form-group"><label class="form-label">الهاتف</label><input type="text" name="phone" class="form-control" value="{{ supplier.phone if supplier else '' }}"></div>
<div class="form-group"><label class="form-label">البريد</label><input type="email" name="email" class="form-control" value="{{ supplier.email if supplier else '' }}"></div>
</div>
<div class="form-group"><label class="form-label">العنوان</label><textarea name="address" class="form-control">{{ supplier.address if supplier else '' }}</textarea></div>
<div style="display:flex;gap:10px;"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button><a href="{{ url_for('suppliers') }}" class="btn btn-outline">إلغاء</a></div>
</form></div></div>
{% endblock %}
