{% extends 'base.html' %}
{% set block_icon = 'fas fa-tags' %}
{% block title %}تعديل تصنيف{% endblock %}
{% block page_title %}تعديل تصنيف{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;"><div class="card-body">
    <form method="POST">
        <div class="form-group">
            <label class="form-label">اسم التصنيف *</label>
            <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">تصنيف أب (اختياري)</label>
            <select name="parent_id" class="form-control">
                <option value="">— تصنيف رئيسي —</option>
                {% for c in cats %}
                <option value="{{ c.id }}" {% if category.parent_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
            <a href="{{ url_for('categories') }}" class="btn btn-outline">إلغاء</a>
        </div>
    </form>
</div></div>
{% endblock %}
