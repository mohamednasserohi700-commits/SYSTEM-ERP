{% extends 'base.html' %}
{% set block_icon = 'fas fa-warehouse' %}
{% block title %}تعديل مخزن{% endblock %}
{% block page_title %}تعديل مخزن{% endblock %}
{% block breadcrumb %}المخازن / تعديل{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;">
    <div class="card-header"><div class="card-title"><i class="fas fa-edit"></i> بيانات المخزن</div></div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_warehouse', id=warehouse.id) }}">
            <div class="form-group"><label class="form-label">اسم المخزن *</label><input type="text" name="name" class="form-control" value="{{ warehouse.name }}" required></div>
            <div class="form-group">
                <label class="form-label">الفرع</label>
                <select name="branch_id" class="form-control">
                    <option value="">— بدون فرع —</option>
                    {% for b in branches %}<option value="{{ b.id }}" {{ 'selected' if warehouse.branch_id == b.id }}>{{ b.name }}{% if not b.is_active %} (موقوف){% endif %}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label class="form-label">العنوان</label><input type="text" name="address" class="form-control" value="{{ warehouse.address or '' }}"></div>
            <div class="form-group">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" name="is_active" {{ 'checked' if warehouse.is_active }}> مخزن نشط
                </label>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
                <a href="{{ url_for('warehouses') }}" class="btn btn-outline">رجوع</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
